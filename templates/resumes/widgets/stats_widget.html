{% load resume_extras %}
<div class="bg-white rounded-lg shadow-md p-6 mb-6">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
            </svg>
            <h2 class="text-lg font-semibold text-gray-900">My Resumes</h2>
        </div>
        <a href="{% url 'resume_create' %}" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">
            + Create New
        </a>
    </div>
    <div class="mt-4 grid grid-cols-3 gap-4">
        <div class="text-center">
            <div class="text-2xl font-bold text-gray-900">{{ stats.total }}</div>
            <div class="text-xs text-gray-500 uppercase tracking-wide">Total</div>
        </div>
        <div class="text-center">
            <div class="text-2xl font-bold text-green-600">{{ stats.complete }}</div>
            <div class="text-xs text-gray-500 uppercase tracking-wide">Complete</div>
        </div>
        <div class="text-center">
            <div class="text-2xl font-bold text-yellow-600">{{ stats.draft }}</div>
            <div class="text-xs text-gray-500 uppercase tracking-wide">Drafts</div>
        </div>
    </div>
    {% if stats.last_edited %}
    <div class="mt-3 text-xs text-gray-400 text-center">
        Last edited {{ stats.last_edited|relative_time }}
    </div>
    {% endif %}
</div>
