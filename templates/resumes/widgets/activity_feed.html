{% load resume_extras %}
<div class="bg-white rounded-lg shadow-md p-4">
    <h3 class="text-sm font-semibold text-gray-700 mb-3">Recent Activity</h3>
    {% if activity %}
    <ul class="space-y-3">
        {% for resume in activity %}
        <li>
            <a href="{% url 'resume_preview' resume.id %}" class="flex items-start gap-3 group">
                <div class="mt-0.5 w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
                    <svg class="w-3 h-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                    </svg>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm text-gray-700 group-hover:text-blue-600 truncate">
                        Edited <span class="font-medium">{{ resume.title }}</span>
                    </p>
                    <p class="text-xs text-gray-400">{{ resume.updated_at|relative_time }}</p>
                </div>
            </a>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="text-sm text-gray-400 text-center py-4">No recent activity</p>
    {% endif %}
</div>
