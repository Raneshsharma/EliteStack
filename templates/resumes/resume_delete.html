{% extends 'base.html' %}
{% block title %}Delete Resume - Placement Copilot{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-16 px-4">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-4">Delete Resume?</h1>
        <p class="text-gray-600 mb-6">
            Are you sure you want to delete "<strong>{{ resume.title }}</strong>"? This action cannot be undone.
        </p>
        <form method="post" class="flex gap-4">
            {% csrf_token %}
            <a href="{% url 'resume_list' %}" class="flex-1 px-4 py-2 border border-gray-300 rounded-md text-center text-gray-700 hover:bg-gray-50">
                Cancel
            </a>
            <button type="submit" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
                Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
